services:
  - type: web
    name: estrella-trader-web
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TZ
        value: America/Bogota
      - key: AUTH_COOKIE_PASSWORD
        sync: false
      - key: PREMIUM_ACCESS_CODE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_TELEGRAM_CHAT_IDS
        sync: false
      - key: RELEASE_VERSION
        sync: false

  - type: worker
    name: estrella-trader-scanner
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python scanner_worker.py
      --config /var/data/scanner_config.json
      --state /var/data/scanner_state.json
      --log /var/data/scanner.log
      --health /var/data/scanner_health.json
    disk:
      name: scanner-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: America/Bogota
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_TELEGRAM_CHAT_IDS
        sync: false
      - key: SCANNER_LOG_MAX_MB
        value: "20"
      - key: SCANNER_LOG_BACKUP_COUNT
        value: "5"
      - key: SCANNER_RESOURCE_PROFILE
        value: render_512mb
      - key: RELEASE_VERSION
        sync: false
